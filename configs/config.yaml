# Root Hydra config for toxic_comment_classifier.
# Composes other configs from group folders (data, features, model, training).
# Override individual fields on the CLI: python -m toxic_comment_classifier.train_model model.C=10

defaults:
  - data: jigsaw
  - features: tfidf
  - model: logreg
  - training: default
  - _self_

# Global seed used to derive everything reproducible.
# training/default.yaml inherits this via interpolation.
seed: 42
