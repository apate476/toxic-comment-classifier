version: '3.8'

services:
  toxic_comment_classifier:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile
    container_name: toxic_comment_classifier_app
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "8000:8000"
